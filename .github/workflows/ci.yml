name: tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSCAD + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openscad xvfb python3

      - name: Run unit tests
        run: xvfb-run -a ./tests/run_tests.sh
